<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>働き方タイプ診断</title>
  </head>

  <body>
    <!--開始画面-->
    <div id="screen-start" class="screen">
      <h1>働き方タイプ診断</h1>
      <p>自分にぴったりの働き方を見つけよう！</p>
      <p>所要時間1分</p>
      <p>全7問</p>
      <button id="button-start">START</button>
    </div>

    <!--質問画面-->
    <div id="screen-question" class="screen">
      <p id="progress"></p>
      <h2 id="question"></h2>
      <button class="choice"></button>
      <button class="choice"></button>
      <button class="choice"></button>
      <button class="choice"></button>
      <button id="button-back">BACK</button>
    </div>

    <!--ローディング画面-->
    <div id="screen-loading" class="screen">
      <h1>AI分析中...</h1>
    </div>

    <!--結果画面-->
    <div id="screen-result" class="screen">
      <p>あなたのタイプは</p>
      <h1 id="result-types" class="results"></h1>

      <div id="result-content"></div>

      <div class="result-actions">
        <button id="button-save-pdf">PDFで保存</button>
        <button id="button-copy-url">URLをコピー</button>
        <button id="button-share-X">Xで共有</button>
        <button id="button-share-LINE">LINEで共有</button>
      </div>
      <button id="button-restart">もう一度診断する</button>
    </div>

    <script src="data/question.js"></script>
    <script src="data/results.js"></script>
    <script src="script.js"></script>
  </body>
</html>
